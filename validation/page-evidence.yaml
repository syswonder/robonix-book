profiles:
  runnable:
    classification: runnable
    presentation: complete
    evidence_requirement: command-contract
  runnable-partial:
    classification: runnable
    presentation: partial
    evidence_requirement: runtime-smoke
  safety-gated:
    classification: safety-gated
    presentation: complete
    evidence_requirement: staged-non-motion
    real_hardware_acceptance:
      required_conditions:
        - A tested emergency stop is reachable by the operator.
        - Speed, acceleration, force, and workspace limits are reviewed and set for first motion.
        - First activation uses an elevated rig or a cleared and isolated test area as appropriate.
        - One device is enabled at a time after a no-motion startup and observed-state check.
      required_evidence:
        - Source revision, robot model, hardware and firmware revisions, operator, and date.
        - Build and no-motion startup logs with expected providers, lifecycle states, and safety configuration.
        - Commanded versus observed motion, stop and watchdog behavior, limit behavior, and final shutdown state.
  safety-gated-partial:
    classification: safety-gated
    presentation: partial
    evidence_requirement: staged-non-motion
    real_hardware_acceptance:
      required_conditions:
        - Complete the omitted vendor, deployment, calibration, and error-handling code before activation.
        - A tested emergency stop is reachable and conservative device limits are active.
        - Validate with hardware outputs inhibited before a supervised single-device motion test.
      required_evidence:
        - Reviewed complete implementation and configuration at the pinned source and package revisions.
        - No-motion initialization, registration, feedback, timeout, stop, and shutdown results.
        - Supervised motion trace and acceptance checklist for the stated robot and device.
  illustrative:
    classification: illustrative
    presentation: illustrative
    evidence_requirement: not-applicable
  partial:
    classification: partial
    presentation: partial
    evidence_requirement: not-applicable
  output:
    classification: output
    presentation: output
    evidence_requirement: not-applicable
  reference:
    classification: reference
    presentation: reference
    evidence_requirement: not-applicable
