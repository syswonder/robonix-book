[book]
authors = []
language = "zh"
description = "robonix 手册"
src = "src"
title = "robonix 手册"

[preprocessor.mermaid]
command = "mdbook-mermaid"

# In-page table of contents: a `[toc]` marker anywhere in a page expands to
# a heading outline. Build dependency: `cargo install mdbook-toc`.
[preprocessor.toc]
command = "mdbook-toc"
marker = "[toc]"

[output.html]
additional-css = ["theme/wide.css"]
additional-js = ["mermaid.min.js", "mermaid-init.js"]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/syswonder/robonix"
mathjax-support = true

[output.html.fold]
enable = true
level = 1
